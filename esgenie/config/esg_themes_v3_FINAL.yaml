# ============================================================
# ESGenie — ESG Themes YAML Dictionary (v3 FINAL)
# ============================================================
# Purpose: Two-tier keyword structure for BM25 thematic pipeline
#
# TIER 1 — page_bucketing_keywords
#   Broad keyword list fed to BM25 to identify top 5 pages per
#   theme before any LLM call. Recall-optimized — catch every
#   page where a relevant KPI might appear.
#
# TIER 2 — kpi_keywords
#   Per-KPI precision terms for hybrid retrieval within bucketed
#   pages. Precision-optimized — maximize correct chunk ranking.
#   Includes: terms (BM25 search), units (value validation),
#   value_type (extraction agent instruction)
#
# Pipeline flow:
#   PDF pages → TIER 1 BM25 → top 5 pages per theme
#   → TIER 2 BM25 + semantic → top chunks per KPI
#   → LLM extraction (once, on smallest possible context)
#
# Coverage: 88 KPIs | 6 themes
# Standards: GRI 2/201/205/303/305/401-405/408/413-414/418
#            SASB Apparel CG-AA-310/430 | TCFD | TNFD | SBTi | FSC
# Version: v3 FINAL — all themes complete
# ============================================================

